services:
  postgres:
    image: postgres:15
    container_name: candy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: candy
      POSTGRES_PASSWORD: candy
      POSTGRES_DB: candy
    ports:
      - "5432:5432"
    volumes:
      - candy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candy -d candy"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: candy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - candy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  candy_pg_data:
  candy_redis_data:
